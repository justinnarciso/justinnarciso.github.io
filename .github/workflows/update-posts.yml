name: Sync Substack posts

on:
  schedule:
    # Runs every day at 13:00 UTC (~9am ET)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update posts.json from Substack feed
        run: node scripts/update-posts.js

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain posts.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "sync posts from substack"
            git push
          else
            echo "Nothing to commit."
          fi
